    <script>
        // State object to keep track of the most recent Ableton Link synchronization coordinates
        let syncState = null;

        // Establish the EventSource stream connection to Django
        const LINK_URL = `{% url "api-link-view" %}`;
        const LINK_SOURCE = new EventSource(LINK_URL);

        LINK_SOURCE.onopen = () => {
            console.log("Ableton Link stream source connected.");
        };

        LINK_SOURCE.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data);
                
                // Keep track of:
                // 1. The current BPM (tempo)
                // 2. The exact beat counter at the time of publication
                // 3. The server timestamp when the beat position was measured
                // 4. The local time we received the packet, to calculate elapsed time
                syncState = {
                    bpm: parseFloat(data.bpm),
                    beat: parseFloat(data.beat),
                    timestamp: parseFloat(data.timestamp),
                    receivedAt: Date.now() / 1000.0
                };
                
                document.getElementById("bpm").innerHTML = `${round(syncState.bpm)} bpm`;
            } catch (err) {
                // Fallback for raw float BPM if legacy messages are encountered
                const new_bpm = parseFloat(e.data);
                if (!isNaN(new_bpm)) {
                    syncState = {
                        bpm: new_bpm,
                        beat: 0,
                        timestamp: Date.now() / 1000.0,
                        receivedAt: Date.now() / 1000.0
                    };
                    document.getElementById("bpm").innerHTML = `${round(new_bpm)} bpm`;
                }
            }
        };

        let smoothBeat = null;
        let lastFrameTime = null;

        // Precision sync loop running on the browser's display refresh rate (e.g. 60Hz/120Hz/144Hz)
        function renderLoop() {
            const now = Date.now() / 1000.0;

            if (syncState) {
                const bps = syncState.bpm / 60.0;
                const targetBeat = syncState.beat + bps * (now - syncState.timestamp);

                if (smoothBeat === null) {
                    smoothBeat = targetBeat;
                } else {
                    const dt = now - lastFrameTime;
                    smoothBeat += bps * dt;
                    // Gently nudge towards the target beat to eliminate state-resync jitter
                    smoothBeat += (targetBeat - smoothBeat) * 0.08;
                }

                // Alternate background opacity every half-beat (strobe)
                const isHalfBeatOdd = Math.floor(smoothBeat * 2) % 2 === 1;
                document.body.style.opacity = isHalfBeatOdd ? "0%" : "100%";
            }

            lastFrameTime = now;
            requestAnimationFrame(renderLoop);
        }

        // Start the animation loop
        requestAnimationFrame(renderLoop);

        function round(num) {
            return Math.round((num + Number.EPSILON) * 100) / 100;
        }
    </script>
